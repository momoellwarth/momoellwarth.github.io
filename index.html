<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Momo Ellwarth</title>

  <style>
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --card: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", Avenir, "Helvetica Neue", Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(88, 28, 135, 0.45), transparent 38%),
        radial-gradient(circle at 80% 75%, rgba(20, 83, 45, 0.50), transparent 42%),
        radial-gradient(circle at 50% 50%, rgba(49, 46, 129, 0.25), transparent 55%),
        #07130f;
      color: var(--fg);
    }

body::before {
  content: "";
  position: fixed;
  top: 34px;
  left: 42px;
  right: 42px;
  height: 1px;
  background: rgba(229, 231, 235, 0.45);
}

main {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 72px 32px 40px;
}
    .card {
      width: 100%;
      max-width: 1150px;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      position: relative;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 300;
      letter-spacing: -0.045em;
      line-height: 1.05;
    }

    .tagline {
      margin-top: 18px;
      max-width: 650px;
      color: var(--muted);
      font-size: clamp(17px, 2.1vw, 21px);
      font-weight: 300;
      line-height: 1.55;
    }
    
    .orbit-nav {
      position: absolute;
      right: 0px;
      top: 50%;
      width: 330px;
      height: 330px;
      transform: translateY(-50%);
    }

    .orbit-link {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 14px 38px rgba(0,0,0,.35);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    
    .orbit-link:hover {
      transform: scale(1.04);
      box-shadow: 0 18px 48px rgba(0,0,0,.45);
      border-color: rgba(255,255,255,.38);
    }

    .research-sun {
      width: 190px;
      height: 190px;
      left: 25px;
      top: 70px;
      background:
        radial-gradient(circle at 35% 30%, #fff7ad 0%, #fbbf24 34%, #ea580c 68%, #7f1d1d 100%);
    }
    
    .planet {
      width: 118px;
      height: 118px;
    }

    .about-planet {
      right: 0;
      top: 22px;
    }
    
    .orbit-link img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .orbit-link::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,.28);
      z-index: 1;
    }

    .research-sun::after {
      background: rgba(15,23,42,.10);
    }

    .orbit-link span {
      position: relative;
      z-index: 2;
      font-weight: 300;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 8px rgba(0,0,0,.65);
    }

    .research-sun span {
      font-size: 1.2rem;
    }

    .social-links {
      margin-top: 28px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.20);
      color: var(--fg);
      text-decoration: none;
      background: rgba(255,255,255,.05);
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }
  
    .social-link:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,.09);
      border-color: rgba(255,255,255,.35);
    }

    .social-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    
    footer {
      margin-top: 36px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 800px) {
      .orbit-nav {
        position: relative;
        right: auto;
        top: auto;
        width: 100%;
        height: auto;
        transform: none;
        margin-top: 38px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 22px;
      }

      .orbit-link,
      .research-sun,
      .planet,
      .about-planet {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
      }
    
      .research-sun {
        width: 170px;
        height: 170px;
      }
    
      .planet {
        width: 125px;
        height: 125px;
        margin-left: 70px;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="card">
      <h1>Momo Ellwarth</h1>

      <p class="tagline">
        Solar physicist working on high-resolution spectroscopy, line bisectors,
        and solar magnetic activity.
      </p>

      <nav class="orbit-nav" aria-label="Main navigation">
        <a class="orbit-link research-sun" href="research.html">
          <span>Research</span>
        </a>

        <a class="orbit-link planet about-planet" href="about.html">
          <img src="me.jpeg" alt="">
          <span>About me</span>
        </a>
      </nav>
      

      <div class="social-links">
        <a class="social-link" href="https://www.linkedin.com/in/momo-ellwarth-5681a82b5/" target="_blank" rel="noreferrer" aria-label="LinkedIn profile">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.32 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.1 20.45H3.54V9H7.1v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.21 0 22.23 0z"/>
          </svg>
          <span>LinkedIn</span>
        </a>
        <a class="social-link" href="cv.pdf" target="_blank" rel="noreferrer">
          <span>CV</span>
        </a>
      </div>
      
      <footer>© <span id="y"></span> Momo Ellwarth</footer>
    </section>
  </main>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>

</html>
