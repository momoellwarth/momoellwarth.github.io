<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Momo Ellwarth</title>

  <style>
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --card: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(56,189,248,.18), transparent 35%),
        radial-gradient(circle at 80% 80%, rgba(251,191,36,.12), transparent 35%),
        var(--bg);
      color: var(--fg);
    }

    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .card {
      width: 100%;
      max-width: 850px;
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: 26px;
      background: var(--card);
      box-shadow: 0 20px 50px rgba(0,0,0,.25);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 58px);
      letter-spacing: -0.04em;
    }

    .tagline {
      margin-top: 12px;
      max-width: 650px;
      color: var(--muted);
      font-size: clamp(17px, 2.3vw, 21px);
      line-height: 1.5;
    }

    .circle-nav {
      margin-top: 36px;
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      align-items: center;
    }

    .circle-link {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,.25);
      box-shadow: 0 12px 35px rgba(0,0,0,.35);
      transition: transform .2s ease, box-shadow .2s ease;
      background: rgba(255,255,255,.08);
    }

    .circle-link:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 18px 45px rgba(0,0,0,.45);
    }

    .circle-link img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .circle-link::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,.35);
      z-index: 1;
    }

    .circle-link span {
      position: relative;
      z-index: 2;
      font-weight: 700;
      font-size: 1.2rem;
      text-shadow: 0 2px 8px rgba(0,0,0,.6);
    }

    .sun-fallback {
      background:
        radial-gradient(circle, #fff7ad 0%, #fbbf24 35%, #ea580c 68%, #7f1d1d 100%);
    }

    footer {
      margin-top: 36px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main>
    <section class="card">
      <h1>Momo Ellwarth</h1>

      <p class="tagline">
        Solar physicist working on high-resolution spectroscopy, line bisectors,
        and solar magnetic activity.
      </p>

      <nav class="circle-nav" aria-label="Main navigation">
        <a class="circle-link sun-fallback" href="research.html">
          <!-- If you have a solar image, upload it as sun.jpg and uncomment this line: -->
          <!-- <img src="sun.jpg" alt=""> -->
          <span>Research</span>
        </a>

        <a class="circle-link" href="about.html">
          <img src="me.jpeg" alt="">
          <span>About me</span>
        </a>
      </nav>

      <footer>© <span id="y"></span> Momo Ellwarth</footer>
    </section>
  </main>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>            <a class="btn" href="https://www.linkedin.com/" target="_blank" rel="noreferrer">LinkedIn</a>

        </div>
      </div>
      <footer>© <span id="y"></span> Momo Ellwarth</footer>
    </article>
  </main>
  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
